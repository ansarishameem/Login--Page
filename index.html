<!DOCTYPE html>
<html>
<head>
<title>Login Page</title>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
	*{
		margin:0px;
		padding:0px;
		box-sizing:border-box;
	}

body{
     background:linear-gradient(135deg,#ff4d8d,#ff66b2,#ff99cc);
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    width:400px;
    padding:30px;
    border-radius:20px;
	box-shadow:0px 15px 35px rgba(255,20,147,0.25);
}

.icon{
    width:70px;
    height:70px;

    background:#ffe4f1;

    color:#ff1493;

    border-radius:50%;

    text-align:center;
    line-height:70px;

    font-size:30px;

    margin:auto;

    box-shadow:0px 0px 15px rgba(255,20,147,0.4);
}

h1{
    text-align:center;
    margin-top:15px;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:gray;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    font-weight:bold;
}

.input-box{
    position:relative;
}

.input-box input{
    width:100%;
    height:45px;
    border:1px solid lightgray;
    border-radius:8px;
    padding-left:40px;
    padding-right:40px;
}

.input-box i{
    position:absolute;
    left:12px;
    top:15px;
        color:#ff1493;
}

.eye{
    left:auto !important;
    right:12px;
}

.forgot{
    display:block;
    text-align:right;
    margin-top:10px;
    text-decoration:none;
    color:#4f46ff;
}

button{
    width:100%;
    height:45px;
    margin-top:20px;

    border:none;
    border-radius:8px;

    background:linear-gradient(to right,#ff1493,#ff69b4);

    color:white;

    font-size:18px;

    cursor:pointer;

    transition:0.3s;
}
button:hover{
    background:linear-gradient(to right,#ff69b4,#ff1493);
    transform:translateY(-5px);
    box-shadow:0px 10px 25px rgba(255,20,147,0.5);
}
input:focus{
    outline:none;
    border:2px solid #ff1493;
    box-shadow:0px 0px 10px rgba(255,20,147,0.3);
}
.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:15px;
    margin-bottom:20px;
}
.remember{
    display:flex;
    align-items:center;
    gap:6px;
}
.remember span{
    color:#555;
    font-size:13px;
}
   
}
.forgot{
   color:#ff1493;
    text-decoration:none;
    font-size:13px;
}
</style>
</head>

<body>

<div class="box">

    <div class="icon">
        <i class="fa-regular fa-user"></i>
    </div>

    <h1>LogIn</h1>

    <label>Email</label>

    <div class="input-box">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" placeholder="Enter your email">
    </div>

    <label>Password</label>
	<div class="input-box">
    <i class="fa-solid fa-lock"></i>
    <input type="password" placeholder="Enter your password">
    <i class="fa-solid fa-eye eye"></i>
</div>
    <div class="options">
		<div class="remember">
			<input type="checkbox">
			<span>Remember Me</span>
		</div>
		<a href="#" class="forgot">Forgot Password</a>
	</div>
		  <button>LOGIN</button>

</div>

</body>
</html>
